name: Deploy gptc.cc to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gptccc-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy homepage and blog to 1Panel
        env:
          PANEL_BASE: ${{ secrets.PANEL_BASE }}
          PANEL_ENTRANCE: ${{ secrets.PANEL_ENTRANCE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          PANEL_TARGET_DIR: ${{ secrets.PANEL_TARGET_DIR }}
        run: |
          node ./scripts/deploy-to-1panel.mjs

      - name: Verify production homepage
        run: |
          curl -fsSL https://gptc.cc/ > /tmp/gptccc-home.html
          grep -q '<link rel="canonical" href="https://gptc.cc/">' /tmp/gptccc-home.html
          grep -q '<title>ChatGPT Plus / Pro 充值升级服务 | GPTC.cc</title>' /tmp/gptccc-home.html

      - name: Verify blog index
        run: |
          curl -fsSL https://gptc.cc/blog/ > /tmp/gptccc-blog.html
          grep -q '<link rel="canonical" href="https://gptc.cc/blog/">' /tmp/gptccc-blog.html
          grep -q '<title>GPTC.cc 充值升级指南｜Plus / Pro 开通、支付失败、续费失败</title>' /tmp/gptccc-blog.html

      - name: Verify activate page
        run: |
          curl -fsSL https://gptc.cc/activate/ > /tmp/gptccc-activate.html
          grep -q '<title>站内充值中心｜嘉哥 GPTC.cc</title>' /tmp/gptccc-activate.html
