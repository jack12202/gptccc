name: Deploy gptc.cc to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-gptccc-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check protected purchase links
        run: |
          node ./scripts/check-purchase-link-lock.mjs

      - name: Check canonical host and analytics guard
        run: |
          node ./scripts/check-site-host-consistency.mjs

      - name: Test recharge providers
        run: |
          node --test ./recharge-center/test/*.test.js

      - name: Deploy homepage and blog to 1Panel
        env:
          PANEL_BASE: ${{ secrets.PANEL_BASE }}
          PANEL_ENTRANCE: ${{ secrets.PANEL_ENTRANCE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          PANEL_TARGET_DIR: ${{ secrets.PANEL_TARGET_DIR }}
        run: |
          node ./scripts/deploy-to-1panel.mjs

      - name: Deploy recharge backend to 1Panel
        env:
          PANEL_BASE: ${{ secrets.PANEL_BASE }}
          PANEL_ENTRANCE: ${{ secrets.PANEL_ENTRANCE }}
          PANEL_USER: ${{ secrets.PANEL_USER }}
          PANEL_PASS: ${{ secrets.PANEL_PASS }}
          PANEL_TARGET_DIR: ${{ secrets.PANEL_TARGET_DIR }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          node ./scripts/deploy-recharge-backend-1panel.mjs

      - name: Verify non-www redirects to www
        run: |
          curl -fsSI https://gptc.cc/ | grep -Eq '^HTTP/[^ ]+ (301|308)'
          curl -fsSI https://gptc.cc/ | grep -Eiq '^location: https://www\.gptc\.cc/'

      - name: Verify production homepage
        run: |
          curl -fsSL https://www.gptc.cc/ > /tmp/gptccc-home.html
          grep -q '<link rel="canonical" href="https://www.gptc.cc/">' /tmp/gptccc-home.html
          grep -q '<title>GPT充值，5分钟完成 | ChatGPT Plus / Pro 充值升级 | GPTC.cc</title>' /tmp/gptccc-home.html

      - name: Verify blog index
        run: |
          curl -fsSL https://www.gptc.cc/blog/ > /tmp/gptccc-blog.html
          grep -q '<link rel="canonical" href="https://www.gptc.cc/blog/">' /tmp/gptccc-blog.html
          grep -q '<title>GPTC.cc 充值升级指南｜Plus / Pro 开通、支付失败、续费失败</title>' /tmp/gptccc-blog.html

      - name: Verify activate page
        run: |
          curl -fsSL https://www.gptc.cc/activate/ > /tmp/gptccc-activate.html
          grep -q '<link rel="canonical" href="https://www.gptc.cc/activate/">' /tmp/gptccc-activate.html
          grep -q '<title>嘉哥AI Plus充值系统｜GPTC.cc</title>' /tmp/gptccc-activate.html
          grep -q '/api/recharge/verify-card' /tmp/gptccc-activate.html
          ! grep -q 'http-equiv="refresh"' /tmp/gptccc-activate.html

      - name: Verify recharge backend routes
        run: |
          curl -fsSL https://www.gptc.cc/admin/provider > /tmp/gptccc-provider-admin.html
          grep -q '<title>源头切换后台｜GPTC.cc</title>' /tmp/gptccc-provider-admin.html
          grep -q 'data-provider="dnscon"' /tmp/gptccc-provider-admin.html
          grep -q 'data-provider="9977ai"' /tmp/gptccc-provider-admin.html
          curl -fsSL https://www.gptc.cc/api/recharge/provider > /tmp/gptccc-provider.json
          grep -q '"success":true' /tmp/gptccc-provider.json
          grep -q '"key":"dnscon"' /tmp/gptccc-provider.json
          grep -q '"key":"9977ai"' /tmp/gptccc-provider.json
